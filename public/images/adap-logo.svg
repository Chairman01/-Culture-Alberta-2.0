<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 735 160" role="img" aria-labelledby="adap-logo-title">
  <title id="adap-logo-title">ADAP – Alberta Disability Assistance Program</title>
  <rect width="735" height="160" fill="#ffffff"/>
  <!-- ADAP wordmark: sky-blue, ultra-light weight, wide letter-spacing to match AISH logo style -->
  <text
    x="10"
    y="120"
    fill="#47BCE0"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="114"
    font-weight="200"
    letter-spacing="10"
    text-rendering="geometricPrecision">ADAP</text>
  <!-- Vertical rule separator -->
  <line x1="390" y1="14" x2="390" y2="146" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <!-- Program name: two lines -->
  <text
    x="412"
    y="74"
    fill="#6b7280"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="27"
    font-weight="300"
    text-rendering="geometricPrecision">Alberta Disability</text>
  <text
    x="412"
    y="114"
    fill="#6b7280"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="27"
    font-weight="300"
    text-rendering="geometricPrecision">Assistance Program</text>
</svg>
